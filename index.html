<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karate Fighter - Local Deploy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="ui">
            <div class="health-bars">
                <div class="health player-health">
                    <span>Player</span>
                    <div class="health-fill" id="playerHealth"></div>
                </div>
                <div class="health enemy-health">
                    <span>Enemy</span>
                    <div class="health-fill" id="enemyHealth"></div>
                </div>
            </div>
            <div class="controls">
                <p>A/D - Move | W - Jump | S - Block | Space - Punch | ←→ Arrow Keys - Special Moves</p>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
